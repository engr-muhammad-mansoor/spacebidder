<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <title>Rejestracja udana</title>
    <!-- Include Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="/css/styles.css">
    <style>
        body {
            background-color: #f8f9fa; /* Set a light background color */
        }

        .title-bar-a {
            background-color: #007bff; /* Set a blue background color */
            height: 60px; /* Set the height of the title bar */
        }

        .registration-success {
            margin: 50px auto;
            max-width: 600px; /* Set a maximum width for the success block */
            padding: 20px;
            background-color: #ffffff; /* Set a white background color */
            border: 1px solid #dee2e6; /* Add a border */
            border-radius: 5px; /* Add some border-radius for rounded corners */
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); /* Add a slight box shadow */
        }

        .registration-success h2 {
            color: #28a745; /* Set a green color for the heading */
        }

        .registration-success p {
            color: #333; /* Set a dark color for the paragraphs */
        }

        .registration-success div {
            margin-top: 20px;
        }

        .registration-success a.button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff; /* Set a blue color for the button */
            color: #fff; /* Set a white color for the text */
            text-decoration: none;
            border-radius: 5px; /* Add some border-radius for rounded corners */
        }

        footer {
            background-color: #f8f9fa; /* Set a light background color for the footer */
            margin-top: 50px;
        }

        .footer-bar-a {
            padding: 20px 0;
        }

        .center-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-bar-a a img {
            width: 40px; /* Set a specific width for the social media icons */
            height: 40px; /* Set a specific height for the social media icons */
        }
        body.dark-mode {
            background-color: #1c1c1c; /* Set your dark mode background color */
            color: #ffffff; /* Set your dark mode text color */
        }

        .mode-button {
            background-color: #8b35a8; /* Pink color for the button */
            border-radius: 50%; /* Round shape */
            padding: 10px 20px; /* Adjust padding as needed */
            color: #fff; /* Text color */
            border: none; /* Remove border */
        }
    </style>
</head>

<body>
<!-- HEADER -->
<header>

    <!-- Dark/Light mode button -->
    <button class="btn mode-button" onclick="toggleDarkMode()">Dark Mode</button>

</header>
<div class="logo-container d-flex justify-content-center align-items-center" style="display: flex; align-items: center;">
    <div></div>
    <img alt="" th:src="@{/static/icons/logo.png}">
</div>

<!-- BLOK Z INFORMACJĄ O UDANEJ REJESTRACJI -->
<div class="container registration-success">
    <h2 class="text-success">Profil zaktualizowany pomyślnie</h2>
    <p>Dziękujemy za rejestrację.</p>
    <div>
        <h3>Konto utworzone na dane:</h3>
        <p>Login: <span th:text="${user.clientLogin}"></span></p>
        <p>Email: <span th:text="${user.clientEmail}"></span></p>
        <p>Imię: <span th:text="${user.clientName}"></span></p>
        <p>Nazwisko: <span th:text="${user.clientSurname}"></span></p>
        <p>Adres: <span th:text="${user.clientAddress}"></span></p>
    </div>
    <a href="/login" class="btn btn-primary mt-3">Przejdź do strony logowania</a>
</div>

<!-- BLOK DOLNY PASEK Z FOLLOW US -->
<footer class="mt-5">
    <div class="center-section d-flex flex-column align-items-center">
        <!-- English: Follow Us text -->
        <p class="mb-3">FOLLOW US</p>

        <div class="d-flex">
            <a class="icon-link" href="https://facebook.com/"><img alt="Facebook" src="/static/icons/facebook.svg"
                                                                   style="width: 40px; height: 40px;"></a>
            <a class="icon-link" href="https://x.com/"><img src="/static/icons/tweeter.svg"
                                                            style="width: 40px; height: 40px;"></a>
            <a class="icon-link" href="https://linkedin.com/"><img src="/static/icons/in.svg"
                                                                   style="width: 40px; height: 40px;"></a>
            <a class="icon-link" href="https://google.com/"><img src="/static/icons/google.svg"
                                                                 style="width: 40px; height: 40px;"></a>
            <a class="icon-link" href="https://youtube.com/"><img src="/static/icons/youtube.svg"
                                                                  style="width: 40px; height: 40px;"></a>
        </div>
    </div>
</footer>

</div>

<!-- Include Bootstrap JS (optional, if you need Bootstrap JavaScript features) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");
    }
</script>

</body>

</html>
