<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - SpaceBidder</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <!-- Your Custom Stylesheet -->
    <link rel="stylesheet" type="text/css" href="/css/css/styles.css">
</head>
<body>
<header th:replace="~{fragments/header :: Header}"></header>

<!-- Contact Us Section -->
<div class="contact-us-container" style="padding: 20px;">
    <h2>Contact Us</h2>
    <p>If you have any questions or concerns, feel free to reach out to us. We're here to help!</p>

    <!-- Contact Form -->
    <form action="/submit-contact" method="post" style="margin-top: 20px;">
        <div class="form-group">
            <label for="name">Your Name:</label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="email">Your Email:</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>

        <div class="form-group">
            <label for="message">Your Message:</label>
            <textarea id="message" name="message" class="form-control" rows="4" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
</div>

<!-- Bootstrap JS (Optional) -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.0.7/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<!-- Footer -->
<footer>
    <!-- Your Footer Content Here -->
</footer>

</body>
</html>
