<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Product List</title>
    <!-- Include Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <style>
        .card-img-top {
            max-height: 450px;
            max-width: 550px;
            object-fit: cover;
        }

        .card {
            background-color: #fff;
            transition: background-color 0.3s ease;
            color: #000;
        }

        body.dark-mode {
            background-color: #333;
            color: #ffffff;
        }

        footer {
            background-color: #f0f0f0;
            color: #333;
            padding: 20px 0;
            text-align: center;
            border-top: 1px solid #ccc;
            margin-top: 30px;
        }

        .mode-button {
            background-color: #8b35a8;
            border-radius: 50%;
            padding: 10px 20px;
            color: #fff;
            border: none;
        }

        .btn-add-to-cart {
            background-color: #28a745;
            color: #fff;
        }

        body.dark-mode .card {
            background-color: #333;
        }

        body.dark-mode .card-text,
        body.dark-mode .card-title {
            color: #fff;
        }

        body.dark-mode footer {
            background-color: #ffffff;
            color: #000000;
        }

        .rating {
            display: flex;
            flex-direction: row-reverse;
        }

        .rating input {
            display: none;
        }

        .rating label {
            position: relative;
            width: 1em;
            font-size: 2em;
            color: #FFD700;
            cursor: pointer;
        }

        .rating label:before {
            content: '\2605';
            position: absolute;
            opacity: 0;
            transition: opacity 0.25s;
        }

        .rating label:hover:before,
        .rating input:checked ~ label:before {
            opacity: 1;
        }

        .record {
            border: 1px solid #ccc;
            margin-bottom: 15px;
            padding: 15px;
            text-align: center;
        }
    </style>
</head>

<body>
<header>
    <!-- Dark/Light mode button -->
    <a href="/home/" class="btn btn-primary">Return to Home</a>
    <button class="btn mode-button" onclick="toggleDarkMode()">Dark Mode</button>
</header>
<div class="logo-container d-flex justify-content-center align-items-center">
    <img alt="SpaceBidder Logo" src="/static/icons/logo.png">
</div>

<div class="container mt-2">
    <h2>List of Sellers</h2>

    <div th:each="seller : ${sellerCategories}">
        <div class="record border mb-3 p-3 text-center">
            <h5 class="card-title" th:text="'Name : ' + ${seller.name}"></h5>

            <form th:action="@{'/evaluation/submit-evaluation-for-seller/' + ${seller.id}}" method="post">
                    <div class="form-group">
                        <label for="ratingInput">Give rating out of 5:</label>
                        <input type="number" class="form-control" id="ratingInput" name="stars" min="1" max="5" required />
                    </div>

                    <button type="submit" class="btn btn-add-to-cart">Submit Evaluation</button>
                </form>

        </div>
    </div>
</div>
<footer class="mt-5">
    <div class="center-section d-flex flex-column align-items-center">
        <!-- English: Follow Us text -->
        <p class="mb-3">FOLLOW US</p>

        <div class="d-flex">
            <a class="icon-link" href="https://facebook.com/"><img alt="Facebook" src="/static/icons/facebook.svg"
                                                                   style="width: 40px; height: 40px;"></a>
            <a class="icon-link" href="https://x.com/"><img src="/static/icons/tweeter.svg"
                                                            style="width: 40px; height: 40px;"></a>
            <a class="icon-link" href="https://linkedin.com/"><img src="/static/icons/in.svg"
                                                                   style="width: 40px; height: 40px;"></a>
            <a class="icon-link" href="https://google.com/"><img src="/static/icons/google.svg"
                                                                 style="width: 40px; height: 40px;"></a>
            <a class="icon-link" href="https://youtube.com/"><img src="/static/icons/youtube.svg"
                                                                  style="width: 40px; height: 40px;"></a>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");
    }

    function enableSubmitButton(sellerId) {
        var stars = document.querySelector('input[name="stars"]:checked');
        var submitBtn = document.getElementById('submitBtn_' + sellerId);

        if (stars) {
            submitBtn.removeAttribute("disabled");
        } else {
            submitBtn.setAttribute("disabled", true);
        }
    }
</script>

<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
</body>

</html>
