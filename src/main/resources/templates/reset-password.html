<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reset Password</title>
    <!-- Include Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <style>
        body.dark-mode {
            background-color: #1c1c1c; /* Set your dark mode background color */
            color: #ffffff; /* Set your dark mode text color */
        }

        .mode-button {
            background-color: #8b35a8; /* Pink color for the button */
            border-radius: 50%; /* Round shape */
            padding: 10px 20px; /* Adjust padding as needed */
            color: #fff; /* Text color */
            border: none; /* Remove border */
        }
    </style>
</head>
<body>
<header>
    <button class="btn mode-button" onclick="toggleDarkMode()">Dark Mode</button>
</header>
<div class="row logo-container justify-content-start">
    <div class="col">
        <img src="/static/icons/logo.png" alt="Logo" class="img-fluid">
    </div>
</div>


<div class="container">
    <h2>Reset Password</h2>

    <!-- Form for entering email -->
    <form th:action="@{/user/reset-password/}" th:object="${user}" method="post">
        <div class="form-group">
            <label for="clientEmail">Email:</label>
            <input type="email" class="form-control" id="clientEmail" th:field="*{clientEmail}" required>
        </div>
        <div class="form-group">
            <label for="clientLogin">Login ID:</label>
            <input type="text" class="form-control" id="clientLogin" th:field="*{clientLogin}" required>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>

    <div th:if="${showPasswordFields}">
        <!-- Form for entering new password and confirm password -->
        <form th:action="@{/user/update-password}" th:object="${user}" method="post" id="passwordForm">
            <!-- Hidden input to store the email -->
            <input type="hidden" th:attr="value=${user.clientEmail}" name="clientEmail" />

            <div class="form-group">
                <label for="newPassword">New Password:</label>
                <input type="password" class="form-control" id="newPassword" th:field="*{clientPass}" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password:</label>
                <input type="password" class="form-control" id="confirmPassword" required>
                <small id="passwordMatchError" class="form-text text-danger"></small>
            </div>
            <button type="button" class="btn btn-primary" onclick="validatePasswords()">Reset Password</button>
        </form>
    </div>

    <!-- Message for passwords not matching -->
    <div th:unless="${showPasswordFields}">
        <div class="alert alert-danger" role="alert">
            Passwords do not match. Please try again.
        </div>
    </div>

    <script>
        function validatePasswords() {
            var newPassword = document.getElementById("newPassword").value;
            var confirmPassword = document.getElementById("confirmPassword").value;
            var errorElement = document.getElementById("passwordMatchError");

            if (newPassword === confirmPassword) {
                // Add a hidden input to store the temporary variable
                var hiddenInput = document.createElement("input");
                hiddenInput.type = "hidden";
                hiddenInput.name = "confirmPassword";
                hiddenInput.value = newPassword;
                document.getElementById("passwordForm").appendChild(hiddenInput);

                // Passwords match, proceed with form submission
                document.getElementById("passwordForm").submit();
            } else {
                // Passwords do not match, display error message
                errorElement.textContent = "Passwords do not match.";
            }
        }
    </script>

    </div>
</div>
<script>
    function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");
    }
</script>
<!-- Include Bootstrap JS and jQuery -->
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
</body>
</html>
