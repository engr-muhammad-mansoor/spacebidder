<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MyShop</title>
    <!-- Include Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Link your custom CSS file -->
    <link rel="stylesheet" type="text/css" href="/css/css/css/styles.css">
    <style>
        body.dark-mode {
            background-color: #1c1c1c; /* Set your dark mode background color */
            color: #ffffff; /* Set your dark mode text color */
        }

        .mode-button {
            background-color: #8b35a8; /* Pink color for the button */
            border-radius: 50%; /* Round shape */
            padding: 10px 20px; /* Adjust padding as needed */
            color: #fff; /* Text color */
            border: none; /* Remove border */
        }
    </style>
</head>
<body>
<header>

    <!-- Dark/Light mode button -->
    <button class="btn mode-button" onclick="toggleDarkMode()">Dark Mode</button>

</header>
<!-- Container for the entire content -->
<div class="container mt-5">

    <!-- Logo Section -->
    <div class="logo-container d-flex justify-content-center align-items-center" style="display: flex; align-items: center;">
        <div></div>
        <img th:src="@{/static/icons/logo.png}" alt="Logo">
    </div>

    <!-- Form Section -->
    <div class="summary">
        <h1 class="mb-4">Edit Data</h1>

        <form th:action="@{'/user/edit-user/'}" method="post">
            <div class="mb-3">
                <label class="form-label" for="client_login">Login</label>
                <input class="form-control" id="client_login" name="clientLogin" required
                       th:field="${user.clientLogin}" type="text">
            </div>
            <div class="mb-3">
                <label class="form-label" for="client_name">First Name</label>
                <input class="form-control" id="client_name" name="clientName" required
                       th:field="${user.clientName}" type="text">
            </div>
            <div class="mb-3">
                <label class="form-label" for="client_surname">Last Name</label>
                <input class="form-control" id="client_surname" name="clientSurname" required
                       th:field="${user.clientSurname}" type="text">
            </div>
            <div class="mb-3">
                <label class="form-label" for="client_email">E-mail</label>
                <input class="form-control" id="client_email" name="clientEmail" required
                       th:field="${user.clientEmail}" type="email" readonly>
            </div>
            <div class="mb-3">
                <label class="form-label" for="client_pass">Password</label>
                <input class="form-control" id="client_pass" name="clientPass" th:field="${user.clientPass}"
                       type="password">
            </div>
            <div class="mb-3">
                <label class="form-label" for="client_address">Address</label>
                <input class="form-control" id="client_address" name="clientAddress" th:field="${user.clientAddress}"
                       type="text">
            </div>
            <button class="btn btn-primary" type="submit">Update</button>
        </form>

    </div>


    <!-- Cancel Section -->
    <div class="mt-3">
        <div class="login">
            <a href="/home/" class="btn btn-secondary">Cancel</a>
        </div>
    </div>

    <!-- Follow Us Section -->
    <footer class="mt-5">
        <div class="center-section d-flex flex-column align-items-center">
            <!-- English: Follow Us text -->
            <p class="mb-3">FOLLOW US</p>

            <div class="d-flex">
                <a class="icon-link" href="https://facebook.com/"><img alt="Facebook" src="/static/icons/facebook.svg"
                                                                       style="width: 40px; height: 40px;"></a>
                <a class="icon-link" href="https://x.com/"><img src="/static/icons/tweeter.svg"
                                                                style="width: 40px; height: 40px;"></a>
                <a class="icon-link" href="https://linkedin.com/"><img src="/static/icons/in.svg"
                                                                       style="width: 40px; height: 40px;"></a>
                <a class="icon-link" href="https://google.com/"><img src="/static/icons/google.svg"
                                                                     style="width: 40px; height: 40px;"></a>
                <a class="icon-link" href="https://youtube.com/"><img src="/static/icons/youtube.svg"
                                                                      style="width: 40px; height: 40px;"></a>
            </div>
        </div>
    </footer>

</div>

<!-- Include Bootstrap JS (optional, if you need Bootstrap JavaScript features) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");
    }
</script>

</body>
</html>
