<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SpaceBidder - Log in</title>
    <!-- Include Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Link your custom CSS file -->
    <link href="/css/css/css/styles.css" rel="stylesheet" type="text/css">
    <style>
        body.dark-mode {
            background-color: #1c1c1c; /* Set your dark mode background color */
            color: #ffffff; /* Set your dark mode text color */
        }

        .mode-button {
            background-color: #8b35a8; /* Pink color for the button */
            border-radius: 50%; /* Round shape */
            padding: 10px 20px; /* Adjust padding as needed */
            color: #fff; /* Text color */
            border: none; /* Remove border */
        }
    </style>
</head>
<body>
<header>
    <!-- Dark/Light mode button -->
    <button class="btn mode-button" onclick="toggleDarkMode()">Dark Mode</button>

</header>
<div class="logo-container d-flex justify-content-center align-items-center" style="height: 120%;">
    <!-- English: Alt text for the logo -->
    <img alt="SpaceBidder Logo" src="/static/icons/logo.png">
</div>

<div class="main-content container mt-5 d-flex flex-column align-items-center">
    <!--BLOK ZALOGUJ-SIE ANULUJ-->
    <div class="summary text-center">
        <form method="post" th:action="@{/login}">
            <div class="mb-3">
                <!-- English: Label for the username input -->
                <label class="form-label" for="username">Username</label>
                <input class="form-control" name="username" required type="text">
            </div>
            <div class="mb-3">
                <!-- English: Label for the password input -->
                <label class="form-label" for="password">Password</label>
                <input class="form-control" name="password" required type="password">
            </div>
            <!-- English: Button text for login -->
            <button class="btn btn-primary" type="submit">Log in</button>
            <a class="btn btn-secondary me-2" href="/home">Cancel</a>
            <!-- Forget Password link -->
            <a class="forget-password-link" href="user/reset-password">Forget Password?</a>
            <br><br>
            <a class="btn btn-secondary me-2" href="/registration/">New Registration</a>
        </form>
    </div>

    <footer class="mt-5">
        <div class="center-section d-flex flex-column align-items-center">
            <!-- English: Follow Us text -->
            <p class="mb-3">FOLLOW US</p>

            <div class="d-flex">
                <a class="icon-link" href="https://facebook.com/"><img alt="Facebook" src="/static/icons/facebook.svg"
                                                                       style="width: 40px; height: 40px;"></a>
                <a class="icon-link" href="https://x.com/"><img src="/static/icons/tweeter.svg"
                                                                style="width: 40px; height: 40px;"></a>
                <a class="icon-link" href="https://linkedin.com/"><img src="/static/icons/in.svg"
                                                                       style="width: 40px; height: 40px;"></a>
                <a class="icon-link" href="https://google.com/"><img src="/static/icons/google.svg"
                                                                     style="width: 40px; height: 40px;"></a>
                <a class="icon-link" href="https://youtube.com/"><img src="/static/icons/youtube.svg"
                                                                      style="width: 40px; height: 40px;"></a>
            </div>
        </div>
    </footer>

</div>

<!-- Include Bootstrap JS (optional, if you need Bootstrap JavaScript features) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");
    }
</script>

</body>
</html>
