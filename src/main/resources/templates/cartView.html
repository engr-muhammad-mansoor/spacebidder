
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Cart</title>
    <!-- Include Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <!-- Custom Styles -->
    <style>
        body {
            background-color: #f8f9fa;
        }

        .container {
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            border-radius: 8px;
        }

        .table th, .table td {
            text-align: center;
        }

        h2 {
            color: #007bff;
        }

        body.dark-mode {
            background-color: #1c1c1c; /* Set your dark mode background color */
            color: #ffffff; /* Set your dark mode text color */
        }

        .mode-button {
            background-color: #8b35a8; /* Pink color for the button */
            border-radius: 50%; /* Round shape */
            padding: 10px 20px; /* Adjust padding as needed */
            color: #fff; /* Text color */
            border: none; /* Remove border */
        }
    </style>
</head>
<body>
<header>
    <!-- Dark/Light mode button -->
    <button class="btn mode-button" onclick="toggleDarkMode()">Dark Mode</button>
</header>
<br><br>
<a class="btn btn-primary" href="/home/">Back to Home Page</a>
<div class="logo-container d-flex justify-content-center align-items-center" style="height: 120%;">
    <!-- English: Alt text for the logo -->
    <img alt="SpaceBidder Logo" src="/static/icons/logo.png">
</div>
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h2 class="mb-4">Shopping Cart</h2>
            <table class="table table-bordered table-hover">
                <thead class="thead-light">
                <tr>
                    <th>Product Name</th>
                    <th>Item Count</th>
                    <th>Total Amount</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <!-- Loop through cart items and display them -->
                <tr th:each="cartItem : ${@cart.cartItems}">
                    <td th:if="${cartItem != null && cartItem.product != null}" th:text="${cartItem.product.productName}"></td>
                    <td th:if="${cartItem != null}" th:text="${cartItem.counter}"></td>
                    <td th:if="${cartItem != null}" th:text="${cartItem.price}"></td>
                    <td>
                        <form th:action="@{'/order/increase/' + ${cartItem.product.productId}}" method="post">
                            <button type="submit" class="btn btn-primary btn-sm">Increase</button>
                        </form>
                        <br>
                        <form th:action="@{'/order/decrease/' + ${cartItem.product.productId}}" method="post">
                            <button type="submit" class="btn btn-primary btn-sm">Decrease</button>
                        </form>
                        <br>
                        <a th:href="@{'/order/remove/' + ${cartItem.product.productId}}" class="btn btn-danger btn-sm ml-2">Remove</a>
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- Display total amount -->
            <div class="text-right mb-3">
                <strong>Total Amount: </strong><span th:text="${@cart.sum}"></span>
            </div>

            <!-- "Buy Now" button -->
            <button class="btn btn-success" data-toggle="modal" data-target="#orderModal">Buy Now</button>
        </div>
    </div>

</div>

<!-- Modal for order details -->
<div class="modal fade" id="orderModal" tabindex="-1" role="dialog" aria-labelledby="orderModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="orderModalLabel">Place Your Order</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <!-- Form for order details -->
                <form th:action="@{/order/saveorder}" method="post">
                    <div class="form-group">
                        <label for="firstName">First Name:</label>
                        <input type="text" class="form-control" id="firstName" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name:</label>
                        <input type="text" class="form-control" id="lastName" name="lastName" required>
                    </div>
                    <div class="form-group">
                        <label for="address">Address:</label>
                        <input type="text" class="form-control" id="address" name="address" required>
                    </div>
                    <div class="form-group">
                        <label for="postCode">Postal Code:</label>
                        <input type="text" class="form-control" id="postCode" name="postCode" required>
                    </div>
                    <div class="form-group">
                        <label for="city">City:</label>
                        <input type="text" class="form-control" id="city" name="city" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Place Order</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Include Bootstrap JS and Popper.js -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
<script>
    function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");
    }
</script>

</body>
</html>
